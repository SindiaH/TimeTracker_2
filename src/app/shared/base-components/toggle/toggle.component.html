@let control = this.control();
@let label = this.label();
@let ariaLabel = this.ariaLabel();
@let labelPosition = this.labelPosition();

<mat-slide-toggle
  class="app-toggle"
  [formField]="control"
  [labelPosition]="labelPosition"
  [attr.aria-label]="ariaLabel">
  {{ label }}<ng-content></ng-content>
</mat-slide-toggle>
