@let control = this.control();
@let options = this.options();
@let multiple = this.multiple();
@let hideIndicator = this.hideIndicator();

<mat-button-toggle-group
  [formControl]="control"
  [multiple]="multiple"
  [hideSingleSelectionIndicator]="hideIndicator"
  [hideMultipleSelectionIndicator]="hideIndicator"
  (change)="optionsChanged($event)">
  @for (option of options; track option.id) {
    <mat-button-toggle
      [value]="option.id"
      [disabled]="!!option.disabled">
      @if (option.icon) {
        <app-icon>{{ option.icon }}</app-icon>
      }
      {{ option.name }}
    </mat-button-toggle>
  }
</mat-button-toggle-group>
