@let control = this.control();
@let name = this.name();
@let radioValues = this.radioValues();
@let groupClass = this.groupClass();

<mat-radio-group
  [class]="groupClass"
  [formField]="control"
  [name]="name">
  @for (value of radioValues; track value.id) {
    <mat-radio-button [value]="value.id">{{ value.name }}</mat-radio-button>
  }
</mat-radio-group>
