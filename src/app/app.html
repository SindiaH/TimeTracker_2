@let isMenuOpen = this.isMenuOpen();
@let isAuthenticated = this.isAuthenticated();

<mat-sidenav-container class="app-root">
  <mat-sidenav
    class="app-root__drawer"
    mode="over"
    position="end"
    [opened]="isMenuOpen"
    (openedChange)="onDrawerOpenedChange($event)">
    <app-side-menu />
  </mat-sidenav>

  <mat-sidenav-content class="app-root__content">
    @if (isAuthenticated) {
      <app-shared-header />
    }
    <main class="app-shell">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
