@let isMenuOpen = this.isMenuOpen();
@let isAuthenticated = this.isAuthenticated();

<app-shell
  [isDrawerOpen]="isMenuOpen"
  (drawerOpenedChange)="onDrawerOpenedChange($event)">
  <app-side-menu shell-drawer />

  <ng-container shell-header>
    @if (isAuthenticated) {
      <app-shared-header />
    }
  </ng-container>

  <router-outlet />
</app-shell>
