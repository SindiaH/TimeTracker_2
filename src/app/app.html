@let navLinks = this.navLinks;
@let navAriaLabelKey = this.navAriaLabelKey;
@let isMobile = this.isMobile();
@let isMenuOpen = this.isMenuOpen();

<mat-sidenav-container class="app-root">
  <mat-sidenav
    class="app-root__drawer"
    mode="over"
    position="end"
    [opened]="isMobile && isMenuOpen"
    (openedChange)="onDrawerOpenedChange($event)">
    <mat-nav-list
      class="app-root__drawer-nav"
      [attr.aria-label]="navAriaLabelKey | translate">
      @for (link of navLinks; track link.path) {
        <a
          mat-list-item
          class="app-root__drawer-link"
          [routerLink]="link.path"
          routerLinkActive="app-root__drawer-link--active"
          (click)="onMobileLinkClicked()">
          <app-icon matListItemIcon>{{ link.icon }}</app-icon>
          <span matListItemTitle>{{ link.translationKey | translate }}</span>
        </a>
      }
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="app-root__content">
    <app-shared-header />
    <main class="app-shell">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
